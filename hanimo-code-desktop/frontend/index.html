<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>hanimo Desktop</title>
    <style>
      body { margin: 0; background: #0a0a0c; color: #e4e4e7; font-family: 'Segoe UI', -apple-system, sans-serif; }
      #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 14px; color: #71717a; }
    </style>
</head>
<body>
<div id="root"><div id="loading">hanimo Desktop loading...</div></div>
<script src="./src/main.tsx" type="module"></script>
<script>
  // Fallback: if React fails to mount after 5s, show error
  setTimeout(function() {
    var el = document.getElementById('loading');
    if (el) el.innerHTML = 'Failed to load. Check WebView2 version.';
  }, 5000);
</script>
</body>
</html>
