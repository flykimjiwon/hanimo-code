# On a `v*` tag push: cross-compile cmd/hanimo-server for 4 OS, attach
# the binaries to the GitHub Release the tag created.
#
# The `hanimo` TUI binary is built and released by separate tooling
# (Makefile / existing release process). This workflow only owns the
# headless `hanimo-server` artifacts so VS Code / external clients can
# always pull pinned versions.

name: release-hanimo-server

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            ext: ''
            label: darwin-arm64
          - goos: darwin
            goarch: amd64
            ext: ''
            label: darwin-x64
          - goos: linux
            goarch: amd64
            ext: ''
            label: linux-x64
          - goos: windows
            goarch: amd64
            ext: '.exe'
            label: win32-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build hanimo-server for ${{ matrix.label }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o "hanimo-server-${{ matrix.label }}${{ matrix.ext }}" \
            ./cmd/hanimo-server

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "hanimo-server-${{ matrix.label }}${{ matrix.ext }}" \
            --clobber
