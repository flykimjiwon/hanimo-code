name: Release Binary

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
            ext: ''
          - os: ubuntu-latest
            target: linux-x64
            ext: ''
          - os: windows-latest
            target: windows-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Bundle with esbuild
        run: node scripts/build-binary.mjs

      - name: Generate SEA blob
        run: node --experimental-sea-config sea.config.json

      - name: Create binary (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cp $(which node) dist/modol-${{ matrix.target }}
          npx postject dist/modol-${{ matrix.target }} NODE_SEA_BLOB dist/sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - dist/modol-${{ matrix.target }}

      - name: Create binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (Get-Command node).Source "dist/modol-${{ matrix.target }}.exe"
          npx postject "dist/modol-${{ matrix.target }}.exe" NODE_SEA_BLOB dist/sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modol-${{ matrix.target }}
          path: dist/modol-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
